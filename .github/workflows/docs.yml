name: Deploy Docs

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to deploy
        default: ${{ github.ref }}
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        default: main
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version-file: package.json

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore GitHub Pages build output
        id: pages-build-cache
        uses: actions/cache@v4
        with:
          path: docs/.vercel/output/static
          key: pages-static-${{ runner.os }}-${{ hashFiles('.github/workflows/docs.yml', 'docs/**', 'icons/**', 'categories/**', 'packages/**', 'scripts/**', 'tools/**', 'package.json', 'pnpm-lock.yaml', 'pnpm-workspace.yaml') }}

      - name: Build docs
        if: steps.pages-build-cache.outputs.cache-hit != 'true'
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: pnpm --dir docs docs:build:github-pages

      - name: Reuse GitHub Pages build output
        if: steps.pages-build-cache.outputs.cache-hit == 'true'
        run: echo "Reused cached GitHub Pages build output."

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vercel/output/static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
